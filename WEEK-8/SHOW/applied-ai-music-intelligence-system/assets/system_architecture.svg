<svg xmlns="http://www.w3.org/2000/svg" width="980" height="520" viewBox="0 0 980 520">
  <rect width="980" height="520" fill="#f6f1e8"/>
  <text x="40" y="42" font-family="Arial, sans-serif" font-size="28" font-weight="700" fill="#2a2d34">Applied AI Music Intelligence System</text>
  <rect x="40" y="90" width="160" height="90" rx="16" fill="#d9e4dd" stroke="#2a2d34" stroke-width="2"/>
  <text x="65" y="125" font-family="Arial, sans-serif" font-size="18" font-weight="700" fill="#2a2d34">User Input</text>
  <text x="58" y="150" font-family="Arial, sans-serif" font-size="14" fill="#2a2d34">genre, mood, energy,</text>
  <text x="68" y="170" font-family="Arial, sans-serif" font-size="14" fill="#2a2d34">acoustic preference</text>
  <rect x="250" y="90" width="190" height="90" rx="16" fill="#f4d6a0" stroke="#2a2d34" stroke-width="2"/>
  <text x="280" y="125" font-family="Arial, sans-serif" font-size="18" font-weight="700" fill="#2a2d34">Guardrails</text>
  <text x="270" y="150" font-family="Arial, sans-serif" font-size="14" fill="#2a2d34">validate fields, clip</text>
  <text x="292" y="170" font-family="Arial, sans-serif" font-size="14" fill="#2a2d34">energy, add warnings</text>
  <rect x="500" y="55" width="190" height="90" rx="16" fill="#c8d5f2" stroke="#2a2d34" stroke-width="2"/>
  <text x="530" y="90" font-family="Arial, sans-serif" font-size="18" font-weight="700" fill="#2a2d34">Song Retrieval</text>
  <text x="518" y="115" font-family="Arial, sans-serif" font-size="14" fill="#2a2d34">retrieve candidate songs</text>
  <text x="523" y="135" font-family="Arial, sans-serif" font-size="14" fill="#2a2d34">using genre, mood,</text>
  <text x="552" y="155" font-family="Arial, sans-serif" font-size="14" fill="#2a2d34">energy, acoustic</text>
  <rect x="500" y="170" width="190" height="90" rx="16" fill="#c8d5f2" stroke="#2a2d34" stroke-width="2"/>
  <text x="535" y="205" font-family="Arial, sans-serif" font-size="18" font-weight="700" fill="#2a2d34">Knowledge Retrieval</text>
  <text x="516" y="230" font-family="Arial, sans-serif" font-size="14" fill="#2a2d34">pull genre and mood</text>
  <text x="527" y="250" font-family="Arial, sans-serif" font-size="14" fill="#2a2d34">guidance snippets</text>
  <rect x="750" y="90" width="180" height="90" rx="16" fill="#e7c6cf" stroke="#2a2d34" stroke-width="2"/>
  <text x="783" y="125" font-family="Arial, sans-serif" font-size="18" font-weight="700" fill="#2a2d34">Reasoner</text>
  <text x="770" y="150" font-family="Arial, sans-serif" font-size="14" fill="#2a2d34">score songs, attach</text>
  <text x="776" y="170" font-family="Arial, sans-serif" font-size="14" fill="#2a2d34">evidence and confidence</text>
  <rect x="250" y="300" width="190" height="90" rx="16" fill="#d9e4dd" stroke="#2a2d34" stroke-width="2"/>
  <text x="282" y="335" font-family="Arial, sans-serif" font-size="18" font-weight="700" fill="#2a2d34">Output Layer</text>
  <text x="277" y="360" font-family="Arial, sans-serif" font-size="14" fill="#2a2d34">top recommendations,</text>
  <text x="285" y="380" font-family="Arial, sans-serif" font-size="14" fill="#2a2d34">warnings, confidence</text>
  <rect x="500" y="300" width="190" height="90" rx="16" fill="#f4d6a0" stroke="#2a2d34" stroke-width="2"/>
  <text x="532" y="335" font-family="Arial, sans-serif" font-size="18" font-weight="700" fill="#2a2d34">Logging</text>
  <text x="514" y="360" font-family="Arial, sans-serif" font-size="14" fill="#2a2d34">writes structured run</text>
  <text x="544" y="380" font-family="Arial, sans-serif" font-size="14" fill="#2a2d34">records to log file</text>
  <rect x="750" y="300" width="180" height="90" rx="16" fill="#f4d6a0" stroke="#2a2d34" stroke-width="2"/>
  <text x="780" y="335" font-family="Arial, sans-serif" font-size="18" font-weight="700" fill="#2a2d34">Evaluation</text>
  <text x="770" y="360" font-family="Arial, sans-serif" font-size="14" fill="#2a2d34">test harness checks</text>
  <text x="789" y="380" font-family="Arial, sans-serif" font-size="14" fill="#2a2d34">reliability summary</text>
  <text x="60" y="440" font-family="Arial, sans-serif" font-size="18" font-weight="700" fill="#2a2d34">Human review</text>
  <text x="40" y="468" font-family="Arial, sans-serif" font-size="14" fill="#2a2d34">Student reviews recommendation quality, confidence, and warnings.</text>
  <line x1="200" y1="135" x2="250" y2="135" stroke="#2a2d34" stroke-width="3"/>
  <line x1="440" y1="135" x2="500" y2="100" stroke="#2a2d34" stroke-width="3"/>
  <line x1="440" y1="135" x2="500" y2="215" stroke="#2a2d34" stroke-width="3"/>
  <line x1="690" y1="100" x2="750" y2="135" stroke="#2a2d34" stroke-width="3"/>
  <line x1="690" y1="215" x2="750" y2="135" stroke="#2a2d34" stroke-width="3"/>
  <line x1="840" y1="180" x2="840" y2="300" stroke="#2a2d34" stroke-width="3"/>
  <line x1="750" y1="135" x2="440" y2="345" stroke="#2a2d34" stroke-width="3"/>
  <line x1="750" y1="135" x2="690" y2="345" stroke="#2a2d34" stroke-width="3"/>
  <polygon points="245,135 232,128 232,142" fill="#2a2d34"/>
  <polygon points="495,103 483,106 490,117" fill="#2a2d34"/>
  <polygon points="493,212 491,224 501,218" fill="#2a2d34"/>
  <polygon points="745,132 733,126 735,139" fill="#2a2d34"/>
  <polygon points="844,295 838,283 850,283" fill="#2a2d34"/>
  <polygon points="447,340 450,327 460,335" fill="#2a2d34"/>
  <polygon points="688,352 697,343 700,355" fill="#2a2d34"/>
</svg>
